<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — OceanSim</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <h2 class="logo">OceanSim</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="simulator.html">Simulator</a>
    <a href="leaderboard.html" class="active">Leaderboard</a>
    <a href="achievements.html">Achievements</a>
    <a href="history.html">History</a>
    <a href="credits.html">Credits</a>
    <a href="login.html" id="authLink">Login</a>
  </div>
</nav>

<!-- PAGE CONTENT -->
<div class="page">
  <div class="data-page-card">
    <div class="data-page-header">
      <div class="data-page-icon">🏆</div>
      <h1 class="data-page-title">Leaderboard</h1>
      <p class="data-page-sub">Top ocean doctors ranked by score</p>
    </div>

    <!-- Loading state -->
    <div id="leaderboardLoading" class="data-loading">
      <div class="data-spinner"></div>
      <p>Loading leaderboard...</p>
    </div>

    <!-- Empty state -->
    <div id="leaderboardEmpty" class="data-empty" style="display:none;">
      <div class="data-empty-icon">🌊</div>
      <p>No scores yet. Be the first to play!</p>
      <a href="simulator.html" class="data-action-btn">Play Ocean Doctor</a>
    </div>

    <!-- Leaderboard table -->
    <div id="leaderboardTable" class="data-table-wrap" style="display:none;">
      <table class="data-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Score</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// =============================================
// Leaderboard page — load and display top scores
// =============================================

// Check auth status for nav link
fetch('check_session.php')
  .then(r => r.json())
  .then(data => {
    const authLink = document.getElementById('authLink');
    if (data.loggedIn) {
      authLink.textContent = 'Logout';
      authLink.href = 'logout.php';
    }
  })
  .catch(() => {});

// Load leaderboard data
fetch('leaderboard_api.php')
  .then(r => r.json())
  .then(data => {
    document.getElementById('leaderboardLoading').style.display = 'none';

    if (!data.success || !data.leaderboard || data.leaderboard.length === 0) {
      document.getElementById('leaderboardEmpty').style.display = 'block';
      return;
    }

    document.getElementById('leaderboardTable').style.display = 'block';
    const tbody = document.getElementById('leaderboardBody');

    data.leaderboard.forEach((entry, i) => {
      const tr = document.createElement('tr');
      const rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
      const date = new Date(entry.played_at).toLocaleDateString();

      tr.innerHTML = `
        <td class="rank-cell">${rankIcon}</td>
        <td class="player-cell">${escapeHtml(entry.username)}</td>
        <td class="score-cell">${entry.score.toLocaleString()}</td>
        <td class="date-cell">${date}</td>
      `;
      if (i < 3) tr.classList.add('top-three');
      tbody.appendChild(tr);
    });
  })
  .catch(() => {
    document.getElementById('leaderboardLoading').innerHTML =
      '<p style="color:#f05050;">Failed to load leaderboard. Please try again.</p>';
  });

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
